services:
  mysql:
    image: mysql:8.4
    container_name: stellar_mysql_local
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: stellar_donations
      MYSQL_USER: stellar_app
      MYSQL_PASSWORD: stellar_app_pw
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-ustellar_app", "-pstellar_app_pw"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
